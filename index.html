<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Resource Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom hover animation for a premium feel */
        .pdf-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pdf-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-white border-b border-slate-200 py-8 px-6 mb-10">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-bold text-slate-800">Classroom Dashboard</h1>
            <p class="text-slate-500 mt-2">Quick access to PDF course materials and resources.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-12">
        <!-- The grid container where JS will inject the links -->
        <div id="links-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cards are generated by JavaScript -->
        </div>
    </main>

    <script>
        /**
         * CONFIGURATION SECTION
         * Add your PDF files here. 
         * For local files, use the relative path (e.g., "files/math.pdf")
         */
        const pdfResources = [
            { name: "HTTP", link: "https://github.com/kocatekin/courses/raw/main/sad/http.pdf" },
            { name: "API", link: "https://github.com/kocatekin/courses/raw/main/sad/api.pdf" }

        ];

        function renderDashboard() {
            const grid = document.getElementById('links-grid');
            
            // Clear existing content
            grid.innerHTML = '';

            pdfResources.forEach(resource => {
                // Create the anchor element
                const card = document.createElement('a');
                card.href = resource.link;
                card.target = "_blank"; // Opens in a new tab
                card.className = "pdf-card flex flex-col items-center justify-center p-8 bg-white border border-slate-200 rounded-2xl text-center group";

                // Add content to the card
                card.innerHTML = `
                    <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-300">
                        📖
                    </div>
                    <div class="text-lg font-semibold text-slate-700 group-hover:text-blue-600 transition-colors">
                        ${resource.name}
                    </div>
                    <div class="mt-2 text-xs font-medium text-slate-400 uppercase tracking-wider">
                        Open PDF
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // Initialize the dashboard on load
        window.onload = renderDashboard;
    </script>
</body>
</html>
